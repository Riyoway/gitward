version: 2
updates:
  # Bump pinned action SHAs via reviewed PRs rather than moving tags.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
